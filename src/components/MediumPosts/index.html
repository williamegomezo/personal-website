<div class="medium-posts">
  <h2>Medium posts</h2>
  <ul class="medium-posts__list">
    <li v-for="post in mediumPosts" class="medium-posts__list-item">
      <v-card class="medium-posts__card">
        <v-card-text>
          <p class="medium-posts__card-title display-1 text--primary">
            {{ post.title }}
          </p>
          <p class="medium-posts__card-categories">
            <span v-for="(category, index) in post.categories">
                {{ category }}<span v-if="index != post.categories.length - 1">, </span>
            </span>
          </p>
          <div class="medium-posts__card-content text--primary" v-html="post.content">
          </div>
        </v-card-text>
        <v-card-actions>
          <v-btn :href="post.link" text color="deep-purple accent-4">
            Go to post
          </v-btn>
        </v-card-actions>
      </v-card>
    </li>
  </ul>
</div>
